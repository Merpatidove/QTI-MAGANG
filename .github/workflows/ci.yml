name: Build and Deploy API Gateway

on:
  push:
    branches: [main]
    paths:
      - "api-gateway/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/merpatidove/qti-api-gateway

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker run -d --name smoke-test -p 8080:8080 \
            ${{ steps.meta.outputs.tags }}
          sleep 3
          curl -s http://localhost:8080/v1/health | grep -q '"status":"ok"'
          echo "Smoke test passed"
          docker rm -f smoke-test

      - name: Update image tag in manifests
        run: |
          IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -1 | cut -d: -f2)
          cd api-gateway/k8s
          sed -i "s|newTag: .*|newTag: ${IMAGE_TAG}|" kustomization.yaml

      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api-gateway/k8s/kustomization.yaml
          git diff --cached --quiet || git commit -m "chore: update api-gateway image tag to ${{ steps.meta.outputs.tags }} [skip ci]"
          git push
